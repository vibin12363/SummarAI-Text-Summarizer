<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SummarAI — Text Summarizer</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:ital,wght@0,400;0,500;1,400&display=swap"
        rel="stylesheet" />
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #0b0e14;
            --surface: #13171f;
            --surface2: #1c2130;
            --border: #252c3d;
            --accent: #4fffb0;
            --accent2: #00c9ff;
            --text: #e8ecf4;
            --muted: #6b7799;
            --danger: #ff6b6b;
            --font-head: 'Syne', sans-serif;
            --font-mono: 'DM Mono', monospace;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--font-mono);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* SCROLLBAR */
        /* GRID BG */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(79, 255, 176, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(79, 255, 176, 0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
            z-index: 0;
        }

        .glow-orb {
            position: fixed;
            width: 600px;
            height: 600px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(79, 255, 176, 0.07) 0%, transparent 70%);
            top: -200px;
            left: -200px;
            pointer-events: none;
            z-index: 0;
            animation: orb-drift 12s ease-in-out infinite alternate;
        }

        .glow-orb2 {
            position: fixed;
            width: 500px;
            height: 500px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(0, 201, 255, 0.06) 0%, transparent 70%);
            bottom: -150px;
            right: -150px;
            pointer-events: none;
            z-index: 0;
            animation: orb-drift 15s ease-in-out infinite alternate-reverse;
        }

        @keyframes orb-drift {
            from {
                transform: translate(0, 0);
            }

            to {
                transform: translate(60px, 40px);
            }
        }

        .wrapper {
            position: relative;
            z-index: 1;
            max-width: 900px;
            margin: 0 auto;
            padding: 48px 24px 80px;
        }

        /* HEADER */
        header {
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            margin-bottom: 48px;
            gap: 16px;
            flex-wrap: wrap;
        }

        .logo {
            font-family: var(--font-head);
            font-size: 2.4rem;
            font-weight: 800;
            letter-spacing: -1px;
            line-height: 1;
        }

        .logo span {
            color: var(--accent);
        }

        .logo-sub {
            font-family: var(--font-mono);
            font-size: 0.72rem;
            color: var(--muted);
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-top: 6px;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(79, 255, 176, 0.08);
            border: 1px solid rgba(79, 255, 176, 0.2);
            color: var(--accent);
            font-size: 0.7rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            padding: 6px 12px;
            border-radius: 4px;
        }

        .badge::before {
            content: '●';
            font-size: 0.5rem;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1
            }

            50% {
                opacity: 0.3
            }
        }

        /* API KEY SECTION */
        .api-section {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px 24px;
            margin-bottom: 28px;
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
        }

        .api-label {
            font-size: 0.7rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--muted);
            white-space: nowrap;
        }

        .api-input {
            flex: 1;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 10px 14px;
            color: var(--text);
            font-family: var(--font-mono);
            font-size: 0.85rem;
            outline: none;
            min-width: 200px;
            transition: border-color 0.2s;
        }

        .api-input:focus {
            border-color: var(--accent);
        }

        .api-input::placeholder {
            color: var(--muted);
        }

        .save-btn {
            background: rgba(79, 255, 176, 0.1);
            border: 1px solid rgba(79, 255, 176, 0.3);
            color: var(--accent);
            font-family: var(--font-mono);
            font-size: 0.8rem;
            padding: 10px 18px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
        }

        .save-btn:hover {
            background: rgba(79, 255, 176, 0.2);
        }

        .key-status {
            font-size: 0.72rem;
            color: var(--muted);
            width: 100%;
            margin-top: 4px;
        }

        .key-status.ok {
            color: var(--accent);
        }

        .key-status.err {
            color: var(--danger);
        }

        /* MAIN CARD */
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            overflow: hidden;
            margin-bottom: 24px;
        }

        .card-header {
            padding: 16px 24px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
        }

        .dot-r {
            background: #ff5f57;
        }

        .dot-y {
            background: #febc2e;
        }

        .dot-g {
            background: #28c840;
        }

        .card-title {
            font-size: 0.7rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--muted);
            margin-left: 6px;
        }

        textarea {
            width: 100%;
            background: transparent;
            border: none;
            color: var(--text);
            font-family: var(--font-mono);
            font-size: 0.9rem;
            line-height: 1.7;
            padding: 24px;
            resize: vertical;
            min-height: 200px;
            outline: none;
        }

        textarea::placeholder {
            color: var(--muted);
        }

        /* CHAR COUNT */
        .char-bar {
            padding: 8px 24px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .char-count {
            font-size: 0.72rem;
            color: var(--muted);
        }

        /* MODE SELECTOR */
        .mode-section {
            padding: 0 24px 24px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .mode-btn {
            flex: 1;
            min-width: 120px;
            padding: 12px 8px;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--muted);
            font-family: var(--font-mono);
            font-size: 0.78rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .mode-btn .mode-icon {
            font-size: 1.2rem;
            display: block;
            margin-bottom: 4px;
        }

        .mode-btn:hover {
            border-color: var(--accent);
            color: var(--text);
        }

        .mode-btn.active {
            background: rgba(79, 255, 176, 0.08);
            border-color: var(--accent);
            color: var(--accent);
        }

        /* SUMMARIZE BTN */
        .action-row {
            padding: 0 24px 24px;
        }

        .summarize-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            border: none;
            border-radius: 10px;
            color: #0b0e14;
            font-family: var(--font-head);
            font-size: 1rem;
            font-weight: 700;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.25s;
            position: relative;
            overflow: hidden;
        }

        .summarize-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(79, 255, 176, 0.25);
        }

        .summarize-btn:active {
            transform: translateY(0);
        }

        .summarize-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .summarize-btn .spinner {
            display: none;
            width: 18px;
            height: 18px;
            border: 2px solid rgba(0, 0, 0, 0.3);
            border-top-color: #0b0e14;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* OUTPUT CARD */
        .output-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            overflow: hidden;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.4s ease;
            display: none;
        }

        .output-card.visible {
            display: block;
            opacity: 1;
            transform: translateY(0);
        }

        .output-header {
            padding: 14px 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .output-label {
            font-size: 0.7rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--accent);
        }

        .copy-btn {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--muted);
            font-family: var(--font-mono);
            font-size: 0.72rem;
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .copy-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        .output-body {
            padding: 24px;
            font-size: 0.92rem;
            line-height: 1.8;
            white-space: pre-wrap;
            min-height: 80px;
        }

        .output-body.streaming::after {
            content: '▋';
            animation: blink 0.7s step-end infinite;
            color: var(--accent);
        }

        @keyframes blink {

            0%,
            100% {
                opacity: 1
            }

            50% {
                opacity: 0
            }
        }

        /* STATS BAR */
        .stats-bar {
            padding: 10px 24px 14px;
            display: flex;
            gap: 24px;
            border-top: 1px solid var(--border);
            flex-wrap: wrap;
        }

        .stat {
            font-size: 0.7rem;
            color: var(--muted);
        }

        .stat strong {
            color: var(--accent);
        }

        /* ERROR */
        .error-msg {
            background: rgba(255, 107, 107, 0.08);
            border: 1px solid rgba(255, 107, 107, 0.25);
            color: var(--danger);
            padding: 14px 20px;
            border-radius: 10px;
            font-size: 0.85rem;
            margin-top: 16px;
            display: none;
        }

        /* FOOTER */
        footer {
            text-align: center;
            margin-top: 48px;
            font-size: 0.7rem;
            color: var(--muted);
            letter-spacing: 1px;
        }

        footer span {
            color: var(--accent);
        }

        /* ── TABLET (max 768px) ── */
        @media (max-width: 768px) {
            .wrapper {
                padding: 32px 16px 60px;
            }

            header {
                margin-bottom: 28px;
            }

            .logo {
                font-size: 1.9rem;
            }

            .api-section {
                padding: 16px;
                gap: 10px;
            }

            .api-input {
                min-width: 0;
                width: 100%;
            }

            .save-btn {
                width: 100%;
                text-align: center;
            }

            .card-header {
                padding: 12px 16px;
            }

            textarea {
                padding: 16px;
                font-size: 0.85rem;
                min-height: 160px;
            }

            .char-bar {
                padding: 6px 16px 12px;
            }

            .mode-section {
                padding: 0 16px 16px;
                gap: 8px;
            }

            .mode-btn {
                min-width: calc(50% - 4px);
                flex: none;
            }

            .action-row {
                padding: 0 16px 16px;
            }

            .output-body {
                padding: 16px;
                font-size: 0.88rem;
            }

            .output-header {
                padding: 12px 16px;
            }

            .stats-bar {
                padding: 10px 16px 12px;
                gap: 12px;
            }
        }

        /* ── MOBILE (max 480px) ── */
        @media (max-width: 480px) {
            .wrapper {
                padding: 20px 12px 48px;
            }

            .logo {
                font-size: 1.6rem;
            }

            .logo-sub {
                font-size: 0.62rem;
                letter-spacing: 2px;
            }

            .badge {
                font-size: 0.62rem;
                padding: 5px 10px;
            }

            .api-section {
                padding: 14px 12px;
            }

            .api-label {
                font-size: 0.65rem;
            }

            .api-input {
                font-size: 0.8rem;
                padding: 9px 12px;
            }

            .mode-section {
                padding: 0 12px 14px;
            }

            .mode-btn {
                min-width: calc(50% - 4px);
                padding: 10px 6px;
                font-size: 0.72rem;
            }

            .mode-btn .mode-icon {
                font-size: 1rem;
            }

            .action-row {
                padding: 0 12px 14px;
            }

            .summarize-btn {
                font-size: 0.9rem;
                padding: 14px;
            }

            textarea {
                padding: 12px;
                font-size: 0.82rem;
                min-height: 140px;
            }

            .char-bar {
                padding: 6px 12px 10px;
                flex-direction: column;
                align-items: flex-start;
                gap: 2px;
            }

            .output-body {
                padding: 14px 12px;
                font-size: 0.84rem;
            }

            .output-header {
                padding: 10px 12px;
            }

            .stats-bar {
                padding: 8px 12px 10px;
                gap: 8px;
            }

            .stat {
                font-size: 0.65rem;
            }

            footer {
                font-size: 0.65rem;
                margin-top: 32px;
            }
        }
    </style>
</head>

<body>

    <div class="glow-orb"></div>
    <div class="glow-orb2"></div>

    <div class="wrapper">
        <header>
            <div>
                <div class="logo">Summar<span>AI</span></div>
                <div class="logo-sub">Powered by Groq API</div>
            </div>
            <div class="badge">Groq AI Active</div>
        </header>

        <!-- API KEY -->
        <div class="api-section">
            <span class="api-label">API Key</span>
            <input type="password" class="api-input" id="apiKey" placeholder="gsk_..." autocomplete="off" />
            <button class="save-btn" onclick="saveKey()">Save Key</button>
            <div class="key-status" id="keyStatus">Enter your Groq API key to get started (free at console.groq.com)
            </div>
        </div>

        <!-- INPUT CARD -->
        <div class="card">
            <div class="card-header">
                <div class="dot dot-r"></div>
                <div class="dot dot-y"></div>
                <div class="dot dot-g"></div>
                <span class="card-title">Input Text</span>
            </div>
            <textarea id="inputText"
                placeholder="Paste any text, article, or paragraph here...&#10;&#10;Try pasting a Wikipedia article, a news story, or any long text you want summarized."
                oninput="updateCharCount()"></textarea>
            <div class="char-bar">
                <span class="char-count" id="charCount">0 characters</span>
                <span class="char-count" id="wordCount">0 words</span>
            </div>

            <!-- MODE SELECTOR -->
            <div class="mode-section">
                <button class="mode-btn active" data-mode="concise" onclick="selectMode(this)">
                    <span class="mode-icon">⚡</span>Concise
                    <div style="font-size:0.65rem;margin-top:2px;opacity:0.7">2-3 sentences</div>
                </button>
                <button class="mode-btn" data-mode="bullets" onclick="selectMode(this)">
                    <span class="mode-icon">📋</span>Bullet Points
                    <div style="font-size:0.65rem;margin-top:2px;opacity:0.7">Key points list</div>
                </button>
                <button class="mode-btn" data-mode="detailed" onclick="selectMode(this)">
                    <span class="mode-icon">📖</span>Detailed
                    <div style="font-size:0.65rem;margin-top:2px;opacity:0.7">Full paragraph</div>
                </button>
                <button class="mode-btn" data-mode="eli5" onclick="selectMode(this)">
                    <span class="mode-icon">🧒</span>ELI5
                    <div style="font-size:0.65rem;margin-top:2px;opacity:0.7">Simple language</div>
                </button>
            </div>

            <div class="action-row">
                <button class="summarize-btn" id="summarizeBtn" onclick="summarize()">
                    <span id="btnText">✦ SUMMARIZE</span>
                    <div class="spinner" id="spinner"></div>
                </button>
            </div>
        </div>

        <!-- ERROR -->
        <div class="error-msg" id="errorMsg"></div>

        <!-- OUTPUT -->
        <div class="output-card" id="outputCard">
            <div class="output-header">
                <span class="output-label">✦ Summary Output</span>
                <button class="copy-btn" onclick="copyOutput()">Copy</button>
            </div>
            <div class="output-body" id="outputBody"></div>
            <div class="stats-bar" id="statsBar"></div>
        </div>

        <footer>Built by <span>Vibin I</span> · Powered by Groq API · AI Text Summarizer</footer>
    </div>

    <script>
        let selectedMode = 'concise';
        let apiKey = localStorage.getItem('summarai_groq_key') || '';

        if (apiKey) {
            document.getElementById('apiKey').value = apiKey;
            document.getElementById('keyStatus').textContent = '✓ API key loaded from last session';
            document.getElementById('keyStatus').className = 'key-status ok';
        }

        function saveKey() {
            const val = document.getElementById('apiKey').value.trim();
            if (!val.startsWith('gsk_')) {
                document.getElementById('keyStatus').textContent = '✗ Invalid key format. Groq keys start with gsk_...';
                document.getElementById('keyStatus').className = 'key-status err';
                return;
            }
            apiKey = val;
            localStorage.setItem('summarai_groq_key', val);
            document.getElementById('keyStatus').textContent = '✓ Key saved!';
            document.getElementById('keyStatus').className = 'key-status ok';
        }

        function selectMode(btn) {
            document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            selectedMode = btn.dataset.mode;
        }

        function updateCharCount() {
            const text = document.getElementById('inputText').value;
            const chars = text.length;
            const words = text.trim() ? text.trim().split(/\s+/).length : 0;
            document.getElementById('charCount').textContent = chars.toLocaleString() + ' characters';
            document.getElementById('wordCount').textContent = words.toLocaleString() + ' words';
        }

        function getPrompt(text, mode) {
            const prompts = {
                concise: `Summarize the following text in 2-3 clear, concise sentences. Capture the most important information only.\n\nText:\n${text}`,
                bullets: `Summarize the following text as a list of bullet points (use • as bullet). Extract the key points, facts, or ideas. Aim for 4-7 bullets.\n\nText:\n${text}`,
                detailed: `Write a detailed summary of the following text in 2-3 paragraphs. Cover all major points, supporting details, and conclusions.\n\nText:\n${text}`,
                eli5: `Explain the following text in very simple language, as if explaining to a 10-year-old. Use simple words, short sentences, and a friendly tone.\n\nText:\n${text}`
            };
            return prompts[mode];
        }

        async function summarize() {
            const text = document.getElementById('inputText').value.trim();
            const errorEl = document.getElementById('errorMsg');
            errorEl.style.display = 'none';

            if (!apiKey) {
                errorEl.textContent = '⚠ Please enter and save your Groq API key first.';
                errorEl.style.display = 'block';
                return;
            }
            if (!text) {
                errorEl.textContent = '⚠ Please paste some text to summarize.';
                errorEl.style.display = 'block';
                return;
            }
            if (text.length < 50) {
                errorEl.textContent = '⚠ Text is too short. Please paste a longer piece of text.';
                errorEl.style.display = 'block';
                return;
            }

            const btn = document.getElementById('summarizeBtn');
            const btnText = document.getElementById('btnText');
            const spinner = document.getElementById('spinner');
            btn.disabled = true;
            btnText.style.display = 'none';
            spinner.style.display = 'block';

            const outputCard = document.getElementById('outputCard');
            const outputBody = document.getElementById('outputBody');
            outputCard.style.display = 'block';
            setTimeout(() => outputCard.classList.add('visible'), 10);
            outputBody.textContent = '';
            outputBody.classList.add('streaming');
            document.getElementById('statsBar').innerHTML = '';

            const startTime = Date.now();

            try {
                const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${apiKey}`
                    },
                    body: JSON.stringify({
                        model: 'llama-3.3-70b-versatile',
                        max_tokens: 1024,
                        temperature: 0.4,
                        messages: [
                            { role: 'system', content: 'You are a helpful assistant that summarizes text clearly and accurately.' },
                            { role: 'user', content: getPrompt(text, selectedMode) }
                        ]
                    })
                });

                if (!response.ok) {
                    const err = await response.json();
                    throw new Error(err.error?.message || `API error ${response.status}`);
                }

                const data = await response.json();
                const summary = data.choices?.[0]?.message?.content;
                if (!summary) throw new Error('No response received from Groq.');

                const elapsed = ((Date.now() - startTime) / 1000).toFixed(1);
                const outWords = summary.trim().split(/\s+/).length;

                outputBody.classList.remove('streaming');
                outputBody.textContent = summary;

                const inputWords = text.trim().split(/\s+/).length;
                const ratio = Math.round((1 - outWords / inputWords) * 100);
                document.getElementById('statsBar').innerHTML = `
        <span class="stat">Mode: <strong>${selectedMode.toUpperCase()}</strong></span>
        <span class="stat">Input: <strong>${inputWords} words</strong></span>
        <span class="stat">Output: <strong>${outWords} words</strong></span>
        <span class="stat">Reduced by: <strong>${ratio > 0 ? ratio : 0}%</strong></span>
        <span class="stat">Time: <strong>${elapsed}s</strong></span>
      `;

            } catch (err) {
                outputBody.classList.remove('streaming');
                outputCard.classList.remove('visible');
                outputCard.style.display = 'none';
                errorEl.textContent = '✗ Error: ' + err.message;
                errorEl.style.display = 'block';
            } finally {
                btn.disabled = false;
                btnText.style.display = 'block';
                spinner.style.display = 'none';
            }
        }

        function copyOutput() {
            const text = document.getElementById('outputBody').textContent;
            navigator.clipboard.writeText(text).then(() => {
                const btn = document.querySelector('.copy-btn');
                btn.textContent = 'Copied!';
                btn.style.color = 'var(--accent)';
                setTimeout(() => { btn.textContent = 'Copy'; btn.style.color = ''; }, 2000);
            });
        }
    </script>
</body>

</html>
